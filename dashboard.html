<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel - Andrés Raíz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="panel">
  <img src="assets/logo.png" class="logo">

  <div class="header">
    <h2>👋 Hola, <span id="nombre"></span></h2>
    <p class="sub">Bienvenido a tu panel</p>
  </div>

  <div class="card">
    <p><strong>Cédula:</strong> <span id="cedula"></span></p>
    <p><strong>Cargo:</strong> <span id="cargo"></span></p>
    <p><strong>Ingreso:</strong> <span id="ingreso"></span></p>

    <div class="vacaciones">
      <p><strong>Vacaciones</strong></p>
      <div class="barra">
        <div id="progreso"></div>
      </div>
      <div class="vac-info">
        <span>Usados: <b id="vacacionesTomadas"></b></span>
        <span>Disponibles: <b id="vacacionesDisponibles"></b></span>
      </div>
    </div>
  </div>

  <div class="btn-group">
    <button class="btn principal" onclick="descargarColilla()">📄 Ver colilla</button>
    <button class="btn secundario" onclick="generarCertificado()">📑 Generar certificado</button>
    <button id="btnDescargar" class="btn descarga" style="display:none;">📥 Descargar certificado</button>
    <button class="btn salir" onclick="cerrarSesion()">Cerrar sesión</button>
  </div>

  <iframe id="visor"></iframe>
</div>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<script>
// =========================
// SESIÓN
// =========================
const empleado = JSON.parse(localStorage.getItem('empleado'));
if (!empleado) window.location.href = "index.html";

// =========================
// DATOS
// =========================
document.getElementById('nombre').innerText = empleado.nombre;
document.getElementById('cedula').innerText = empleado.cedula;
document.getElementById('cargo').innerText = empleado.cargo;

const fecha = new Date(empleado.ingreso);
document.getElementById('ingreso').innerText = fecha.toLocaleDateString('es-CO', {
  year: 'numeric', month: 'long', day: 'numeric'
});

// =========================
// VACACIONES
// =========================
const hoy = new Date();
const meses = (hoy.getFullYear() - fecha.getFullYear()) * 12 + (hoy.getMonth() - fecha.getMonth());

const acumuladas = Math.floor((15 / 12) * meses);
const tomadas = parseInt(empleado.vacaciones || 0);
const disponibles = Math.max(acumuladas - tomadas, 0);

document.getElementById('vacacionesTomadas').innerText = tomadas;
document.getElementById('vacacionesDisponibles').innerText = disponibles;

const porcentaje = acumuladas > 0 ? (tomadas / acumuladas) * 100 : 0;
document.getElementById("progreso").style.width = porcentaje + "%";

// =========================
// FUNCIONES
// =========================
function cerrarSesion() {
  localStorage.removeItem('empleado');
  window.location.href = "index.html";
}

function descargarColilla() {
  const mes = new Date().toISOString().slice(0, 7);
  document.getElementById("visor").style.display = "block";
  document.getElementById("visor").src = `colillas/${empleado.cedula}/${mes}.pdf`;
}

// =========================
// FORMATEO
// =========================
function numeroATexto(valor) {
  return new Intl.NumberFormat('es-CO', {
    style: 'currency',
    currency: 'COP',
    minimumFractionDigits: 0
  }).format(valor);
}

function enLetras(n) {
  const UNIDADES = ["", "UNO", "DOS", "TRES", "CUATRO", "CINCO", "SEIS", "SIETE", "OCHO", "NUEVE"];
  const DECENAS = ["", "DIEZ", "VEINTE", "TREINTA", "CUARENTA", "CINCUENTA", "SESENTA", "SETENTA", "OCHENTA", "NOVENTA"];
  const CENTENAS = ["", "CIENTO", "DOSCIENTOS", "TRESCIENTOS", "CUATROCIENTOS", "QUINIENTOS", "SEISCIENTOS", "SETECIENTOS", "OCHOCIENTOS", "NOVECIENTOS"];

  function convertir(n) {
    if (n === 0) return "CERO";
    if (n === 100) return "CIEN";

    let millones = Math.floor(n / 1000000);
    let miles = Math.floor((n % 1000000) / 1000);
    let cientos = n % 1000;

    let resultado = "";

    if (millones > 0) resultado += (millones === 1 ? "UN MILLÓN " : convertir(millones) + " MILLONES ");
    if (miles > 0) resultado += (miles === 1 ? "MIL " : convertir(miles) + " MIL ");

    if (cientos > 0) {
      let c = Math.floor(cientos / 100);
      let d = Math.floor((cientos % 100) / 10);
      let u = cientos % 10;

      if (c > 0) resultado += CENTENAS[c] + " ";

      if (d === 1 && u > 0) {
        resultado += ["DIEZ", "ONCE", "DOCE", "TRECE", "CATORCE", "QUINCE"][u] + " ";
      } else {
        if (d > 0) resultado += DECENAS[d] + (u > 0 ? " Y " : " ");
        if (u > 0) resultado += UNIDADES[u] + " ";
      }
    }
    return resultado.trim();
  }

  return convertir(n) + " PESOS";
}

// =========================
// CERTIFICADO (ESTRUCTURA REAL)
// =========================
async function generarCertificado() {
  const { nombre, cedula, cargo, ingreso, salario, transporte, rodamiento, comisiones } = empleado;

  const fechaActual = new Date().toLocaleDateString("es-CO", {
    year: 'numeric', month: 'long', day: 'numeric'
  });

  const ingresoFecha = new Date(ingreso).toLocaleDateString("es-CO", {
    year: 'numeric', month: 'long', day: 'numeric'
  });

  const existingPdfBytes = await fetch("certificado_base.pdf").then(res => res.arrayBuffer());
  const pdfDoc = await PDFLib.PDFDocument.load(existingPdfBytes);
  const page = pdfDoc.getPages()[0];

  const font = await pdfDoc.embedFont(PDFLib.StandardFonts.TimesRoman);

  const left = 75;
  const maxWidth = 420;
  const fontSize = 9.5;
  const lineHeight = 16;

  let y = 720; // 🔥 ARRIBA COMO CERTIFICADO REAL

  function drawParagraph(text, extraY = 10) {
    const words = text.split(" ");
    let line = "";

    for (let word of words) {
      const testLine = line + word + " ";
      const width = font.widthOfTextAtSize(testLine, fontSize);

      if (width > maxWidth) {
        page.drawText(line.trim(), { x: left, y, size: fontSize, font });
        y -= lineHeight;
        line = word + " ";
      } else {
        line = testLine;
      }
    }

    if (line.trim()) {
      page.drawText(line.trim(), { x: left, y, size: fontSize, font });
      y -= lineHeight;
    }

    y -= extraY;
  }

  // FECHA
  drawParagraph(`Sabaneta, ${fechaActual}`, 25);

  // TITULO
  drawParagraph(`A QUIEN PUEDA INTERESAR`, 30);

  // CUERPO
  drawParagraph(
    `ANDRÉS RAÍZ INMOBILIARIA S.A.S., con NIT 901524934, certifica que el señor(a) ${nombre}, identificado con cédula de ciudadanía No. ${cedula}, labora en nuestra compañía desde el ${ingresoFecha} hasta la fecha bajo el cargo de ${cargo} mediante contrato a término indefinido.`,
    20
  );

  let remuneracion =
    `Su remuneración se compone de: salario básico de ${enLetras(salario)} (${numeroATexto(salario)})`;

  if (transporte > 0)
    remuneracion += `, auxilio de transporte de ${enLetras(transporte)} (${numeroATexto(transporte)})`;

  if (rodamiento > 0)
    remuneracion += `, auxilio de rodamiento de ${enLetras(rodamiento)} (${numeroATexto(rodamiento)})`;

  if (comisiones > 0)
    remuneracion += `, recibe a la fecha un promedio de salario variable de ${enLetras(comisiones)} (${numeroATexto(comisiones)})`;

  remuneracion += ".";

  drawParagraph(remuneracion, 20);

  // CIERRE
  drawParagraph(
    `Este certificado se expide a solicitud del interesado para los fines que estime convenientes. Para cualquier información adicional, puede comunicarse al correo servicio@andresraiz.com o a los teléfonos 358 85 64 y 3245366761.`,
    40
  );

  const pdfBytes = await pdfDoc.save();
  const blob = new Blob([pdfBytes], { type: 'application/pdf' });
  const url = URL.createObjectURL(blob);

  document.getElementById('visor').style.display = 'block';
  document.getElementById('visor').src = url;

  const boton = document.getElementById('btnDescargar');
  boton.style.display = 'block';

  boton.onclick = () => {
    const a = document.createElement('a');
    a.href = url;
    a.download = `Certificado_${nombre}.pdf`;
    a.click();
  };
}
</script>

</body>
</html>
