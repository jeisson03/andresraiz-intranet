<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel - Andrés Raíz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="panel">
  <img src="assets/logo.png" class="logo" alt="Logo"/>

  <h2>Bienvenido, <span id="nombre"></span></h2>

  <div class="info-box">
    <p><strong>Cédula:</strong> <span id="cedula"></span></p>
    <p><strong>Cargo:</strong> <span id="cargo"></span></p>
    <p><strong>Fecha de ingreso:</strong> <span id="ingreso"></span></p>
    <p><strong>Días disfrutados:</strong> <span id="vacacionesTomadas"></span></p>
    <p><strong>Días disponibles:</strong> <span id="vacacionesDisponibles"></span></p>
  </div>

  <div class="btn-group">
    <button onclick="descargarColilla()">Ver colilla de este mes</button>
    <button onclick="generarCertificado()">Generar certificado laboral</button>
    <button id="btnDescargar" style="display:none;">📥 Descargar certificado</button>
    <button onclick="cerrarSesion()">Cerrar sesión</button>
  </div>

  <iframe id="visor" style="display:none;" width="100%" height="500px"></iframe>
</div>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<script>
const empleado = JSON.parse(localStorage.getItem('empleado'));
if (!empleado) window.location.href = "index.html";

// DATOS
document.getElementById('nombre').innerText = empleado.nombre;
document.getElementById('cedula').innerText = empleado.cedula;
document.getElementById('cargo').innerText = empleado.cargo;

const fecha = new Date(empleado.ingreso);
document.getElementById('ingreso').innerText = fecha.toLocaleDateString('es-CO');

// VACACIONES
const hoy = new Date();
const meses = (hoy.getFullYear() - fecha.getFullYear()) * 12 + (hoy.getMonth() - fecha.getMonth());

const acumuladas = Math.floor((15 / 12) * meses);
const tomadas = parseInt(empleado.vacaciones || 0);
const disponibles = Math.max(acumuladas - tomadas, 0);

document.getElementById('vacacionesTomadas').innerText = tomadas;
document.getElementById('vacacionesDisponibles').innerText = disponibles;

// =========================
// FUNCIONES
// =========================

function cerrarSesion() {
  localStorage.removeItem('empleado');
  window.location.href = "index.html";
}

// 🚧 COLILLA (PROXIMAMENTE)
function descargarColilla() {
  const visor = document.getElementById("visor");

  visor.style.display = "block";

  visor.srcdoc = `
    <div style="
      display:flex;
      align-items:center;
      justify-content:center;
      height:100%;
      font-family:Segoe UI;
      text-align:center;
      color:#666;
    ">
      <div>
        <h2 style="color:#f06c00;">🚧 Próximamente</h2>
        <p>Las colillas de pago estarán disponibles pronto.</p>
      </div>
    </div>
  `;
}

// 📄 CERTIFICADO (FUNCIONANDO)
async function generarCertificado() {

  const pdfDoc = await PDFLib.PDFDocument.create();
  const page = pdfDoc.addPage([600, 800]);

  const font = await pdfDoc.embedFont(PDFLib.StandardFonts.Helvetica);

  page.drawText("CERTIFICADO LABORAL", {
    x: 180,
    y: 750,
    size: 16,
    font
  });

  page.drawText(`Nombre: ${empleado.nombre}`, { x: 50, y: 700, size: 12, font });
  page.drawText(`Cédula: ${empleado.cedula}`, { x: 50, y: 680, size: 12, font });
  page.drawText(`Cargo: ${empleado.cargo}`, { x: 50, y: 660, size: 12, font });

  const pdfBytes = await pdfDoc.save();
  const blob = new Blob([pdfBytes], { type: 'application/pdf' });
  const url = URL.createObjectURL(blob);

  // 🔥 RESETEAR IFRAME (SOLUCIÓN REAL)
  const visorActual = document.getElementById("visor");
  visorActual.remove();

  const nuevoVisor = document.createElement("iframe");
  nuevoVisor.id = "visor";
  nuevoVisor.style.width = "100%";
  nuevoVisor.style.height = "500px";
  nuevoVisor.style.marginTop = "15px";

  document.querySelector(".panel").appendChild(nuevoVisor);

  nuevoVisor.src = url;

  // BOTON DESCARGA
  const boton = document.getElementById('btnDescargar');
  boton.style.display = 'block';

  boton.onclick = () => {
    const a = document.createElement('a');
    a.href = url;
    a.download = `Certificado_${empleado.nombre}.pdf`;
    a.click();
  };
}
</script>

</body>
</html>
