<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intranet Andrés Raíz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-wrapper">
  <div class="login-container">

    <img src="assets/logo.png" alt="Logo" class="logo">

    <h1>Intranet</h1>
    <p class="subtitle">Andrés Raíz Inmobiliaria</p>

    <form id="loginForm">
      <input type="text" id="usuario" placeholder="Usuario" required>
      <input type="password" id="clave" placeholder="Contraseña" required>

      <button type="submit">Ingresar</button>
    </form>

    <p id="error" class="error-msg"></p>

  </div>
</div>

<script>
const URL_BACKEND = "https://backend-vercel-pi.vercel.app/api/empleados";

document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const usuario = document.getElementById("usuario").value.trim();
  const clave = document.getElementById("clave").value.trim();

  try {
    const res = await fetch(URL_BACKEND, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ usuario, clave })
    });

    const data = await res.json();

    if (!res.ok) {
      document.getElementById("error").innerText = data.error || "Error al iniciar sesión.";
      return;
    }

    localStorage.setItem("empleado", JSON.stringify(data));
    window.location.href = "dashboard.html";

  } catch {
    document.getElementById("error").innerText = "Error de conexión.";
  }
});
</script>

</body>
</html>
